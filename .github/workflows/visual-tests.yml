name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual:
    name: Detect visual regressions (clean -> with-bugs)
    runs-on: ubuntu-latest
    # Pinned to the same Playwright version as package.json so rendering in CI
    # is byte-for-byte identical to `npm run docker:*` locally.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Record baselines from the CLEAN build
        run: npm run baseline:ci
        env:
          BASE_URL: https://practicesoftwaretesting.com

      - name: Sanity — CLEAN build must match its own baselines (no false positives)
        run: npm run test:ci
        env:
          BASE_URL: https://practicesoftwaretesting.com

      - name: Detect regressions in the WITH-BUGS build (diffs expected)
        id: regression
        continue-on-error: true
        run: npm run test:ci
        env:
          BASE_URL: https://with-bugs.practicesoftwaretesting.com

      - name: Assert the suite caught the regressions
        run: |
          if [ "${{ steps.regression.outcome }}" = "success" ]; then
            echo "::error::Expected the with-bugs build to differ from the baselines, but no visual diffs were found."
            exit 1
          fi
          echo "✅ Visual suite correctly flagged the regressions in the with-bugs build."

      - name: Upload Playwright report (includes side-by-side diffs)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
