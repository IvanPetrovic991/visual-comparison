name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Horizontal scaling: split the suite across N shards, one runner each ──
  visual:
    name: Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest
    # Pinned to the same Playwright version as package.json so rendering in CI
    # is byte-for-byte identical to `npm run docker:*` locally.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    # Firefox refuses to launch when $HOME (set to /github/home by the runner)
    # isn't owned by the running user. Point it at the container root's home.
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Record baselines from the CLEAN build (this shard)
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --update-snapshots=all
        env:
          BASE_URL: https://practicesoftwaretesting.com

      - name: Sanity — CLEAN must match its own baselines (no false positives)
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          BASE_URL: https://practicesoftwaretesting.com

      - name: Reset reports so both reports capture the with-bugs run
        run: rm -rf allure-results blob-report

      - name: Detect regressions in the WITH-BUGS build (diffs expected)
        id: regression
        continue-on-error: true
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          BASE_URL: https://with-bugs.practicesoftwaretesting.com

      - name: Upload this shard's Allure results (real visual-diff failures → dashboard)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 1

      - name: Assert this shard caught its regressions
        run: |
          if [ "${{ steps.regression.outcome }}" = "success" ]; then
            echo "::error::Shard ${{ matrix.shardIndex }} expected visual diffs against the with-bugs build but found none."
            exit 1
          fi
          echo "✅ Shard ${{ matrix.shardIndex }} correctly flagged the regressions."

      - name: Upload this shard's blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  # ── Stitch every shard's blob report into ONE native HTML report (with diffs) ──
  merge:
    name: Merge native report
    if: ${{ !cancelled() }}
    needs: [visual]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all shard blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into a single HTML report
        run: npm run merge-report

      - name: Upload merged Playwright report (includes side-by-side diffs)
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Build the Allure dashboard (with history) and publish it to GitHub Pages ──
  allure:
    name: Allure report → GitHub Pages
    if: ${{ !cancelled() }}
    needs: [visual]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Allure results from all shards
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Load previous Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report (keeping history/trends)
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 30

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
